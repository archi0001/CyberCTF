{% extends "base.html" %}

{% block content %}

<div id="bg-canvas"></div>

<style>
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(circle at 20% 20%, #001f2f, #000814);
}
.transparent-text {
  text-align: center;
  padding-top: 100px;
  padding-bottom: 100px;
}

.category-header h3{
    color:#00e5ff;
    font-weight:600;
    letter-spacing:1px;
    border-left:3px solid #00e5ff;
    padding-left:12px;
    text-shadow:0 0 10px rgba(0,255,255,0.4);
}


.challenge-button{

    background: rgba(0,15,25,0.8) !important;
    border:1px solid rgba(0,255,255,0.15) !important;
    border-radius:10px;

    transition: all 0.2s ease;
    backdrop-filter: blur(6px);

    color:#cfefff !important;
}

.challenge-button:hover{

    border-color:#00e5ff !important;

    transform: translateY(-3px);

    box-shadow:
        0 0 10px rgba(0,255,255,0.2),
        inset 0 0 8px rgba(0,255,255,0.1);

}


/* SOLVED CHALLENGE */

.challenge-button.challenge-solved{

    border:1px solid rgba(0,255,120,0.6) !important;

    background: rgba(0,255,120,0.08) !important;

    box-shadow:
        0 0 10px rgba(0,255,120,0.25),
        inset 0 0 6px rgba(0,255,120,0.15);

}


/* hover solved */

.challenge-button.challenge-solved:hover{

    border-color:#00ff88 !important;

    box-shadow:
        0 0 14px rgba(0,255,120,0.35),
        inset 0 0 8px rgba(0,255,120,0.2);

}

h1,h2,h3,h4,h5{
  color:#00e5ff;
  text-shadow:0 0 10px rgba(0,255,255,0.4);
}

</style>
<script src="/themes/CyberCTF/static/js/particles.js"></script>

  <div class="transparent-text">
    <div class="container">
      <h1>
        {% trans %}Challenges{% endtrans %}
      </h1>
    </div>
  </div>

  <div class="container">
    <div class="row">
      <div class="col-md-12">
        {% include "components/errors.html" %}
      </div>
    </div>

    <div 
      x-data="ChallengeBoard" 
      @load-challenges.window="loadChallenges()" 
      @load-challenge.window="loadChallenge($event.detail)"
    >
      <div
          x-ref="challengeWindow" id="challenge-window" class="modal fade" tabindex="-1" role="dialog" x-data=""
          x-html="$store.challenge.data.view"
      ></div>

      <div x-show="!loaded">
        <div class="min-vh-50 d-flex align-items-center">
          <div class="text-center w-100">
            <i class="fas fa-circle-notch fa-spin fa-3x fa-fw spinner"></i>
          </div>
        </div>
      </div>

      <div x-show="loaded">
        <template x-for="(category, idx) in getCategories()" :key="idx">
          <div class="pt-5">
            <div class="category-header mb-3">
              <h3 x-text="category"></h3>
            </div>

            <div class="category-challenges d-flex flex-column">
              <div class="challenges-row row">
                <template x-for="(c, idx) in getChallenges(category)" :key="c.id">
                  <div class="col-sm-6 col-md-4 col-lg-3 my-3">
                    <button
                        class="challenge-button btn btn-dark w-100 h-100"
                        :class="[
                          c.solved_by_me ? 'challenge-solved' : '',
                          ...c.tags.map((tag) => `tag-${tag.value.replace(/ /g, '-')}`),
                        ];"
                        :value="c.id" @click="loadChallenge(c.id)"
                    >

                      <div class="challenge-inner my-3">
                        <p x-text="c.name"></p>
                        <span x-text="c.value"></span>
                      </div>
                    </button>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  {{ Assets.js("assets/js/challenges.js") }}
  {{ super() }}
{% endblock %}
